<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vintelligent Africa | Intelligence Stratégique & SID</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.6.14/vue.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/2.1.3/TweenMax.min.js"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    h1, h2, h3, .syne { font-family: 'Syne', sans-serif; }
    .hero-glow { background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(16,185,129,0.18) 0%, transparent 70%); }
    
    /* Styles pour le moteur d'animation Vue */
    .anim-container { position: relative; width: 100%; height: 300px; overflow: hidden; border-radius: 24px; background: #0f172a; border: 1px solid rgba(255,255,255,0.06); }
    .anim-page { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    .anim-nav { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 20; }
    .anim-btn { padding: 6px 12px; border-radius: 99px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
    
    /* Couleurs des animations */
    .fade { background: #461467; }
    .slide { background: #ffba57; }
    .slideUp { background: #ff7655; }
    .zoom { background: #00aca0; }
    .flipX { background: #8ed3c9; }
    .flipY { background: #fcf5d8; color: #333; }

    .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 99px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .tag-emerald { background: rgba(16,185,129,0.12); color: #10b981; border: 1px solid rgba(16,185,129,0.2); }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(16,185,129,0.15); border-top-color: #10b981; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-[#0b0f1a] text-slate-100">

<nav class="fixed top-0 w-full z-50 backdrop-blur-xl bg-[#0b0f1a]/80 border-b border-white/5">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-emerald-500 rounded-lg shadow-lg shadow-emerald-500/20"></div>
            <span class="text-xl font-black tracking-tighter syne text-white">Vintelligent<span class="text-emerald-400">-AFRICA</span></span>
        </div>
    </div>
</nav>

<section class="hero-glow pt-40 pb-20 px-6 text-center">
  <div class="max-w-4xl mx-auto">
    <span class="tag tag-emerald mb-6">Système Décisionnel 2026</span>
    <h1 class="syne text-5xl md:text-7xl font-black leading-none tracking-tight mb-8">
      Le Pouls de <span class="text-emerald-400 text-glow">l'Afrique</span>
    </h1>
    
    <div id="vue-app" class="anim-container shadow-2xl mb-12">
      <component :is="view">
        <h2 class="syne text-4xl font-black" v-text="view"></h2>
      </component>
      
      <div class="anim-nav">
        <button v-for="anim in animations" 
                @click="setView(anim)"
                v-text="anim"
                :class="anim === view ? 'bg-emerald-500 text-white' : 'bg-slate-800 text-slate-400'"
                class="anim-btn">
        </button>
      </div>
    </div>

    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a href="#invest" class="px-8 py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-2xl transition-all">Accéder aux Données</a>
    </div>
  </div>
</section>

<main class="max-w-7xl mx-auto px-6 pb-24">
  <section id="invest" class="py-16">
    <div id="dynamic-content-root"></div>
  </section>
</main>

<script>
const animState = {
    animations: ['fade', 'slide', 'slideUp', 'zoom', 'flipX', 'flipY'],
    view: 'slide'
};

const PageBase = {
    template: `
        <transition @enter="enter" @leave="leave" :css="false" appear>
            <div class="anim-page" :class="view">
                <slot></slot>
            </div>
        </transition>
    `,
    data() { return animState; }
};

Vue.component('fade', {
    mixins: [PageBase],
    methods: {
        enter(el, done) { TweenMax.fromTo(el, 1, { autoAlpha: 0, scale: 1.5 }, { autoAlpha: 1, scale: 1, ease: Power4.easeOut, onComplete: done }); },
        leave(el, done) { TweenMax.to(el, 1, { autoAlpha: 0, scale: 0.8, ease: Power4.easeOut, onComplete: done }); }
    }
});

Vue.component('slide', {
    mixins: [PageBase],
    methods: {
        enter(el, done) { 
            const tl = new TimelineMax({ onComplete: done });
            tl.set(el, { x: '100%', scale: 0.8 }).to(el, 0.5, { x: 0 }).to(el, 0.8, { scale: 1, ease: Power4.easeOut });
        },
        leave(el, done) { TweenMax.to(el, 0.8, { autoAlpha: 0, ease: Power4.easeOut, onComplete: done }); }
    }
});

['slideUp', 'zoom', 'flipX', 'flipY'].forEach(name => {
    Vue.component(name, {
        mixins: [PageBase],
        methods: {
            enter(el, done) {
                let from = { autoAlpha: 0 };
                if(name === 'slideUp') from.y = '100%';
                if(name === 'zoom') from.scale = 2;
                if(name === 'flipX') from.rotationX = 90;
                if(name === 'flipY') from.rotationY = 90;
                TweenMax.fromTo(el, 1, from, { autoAlpha:1, y:0, scale:1, rotationX:0, rotationY:0, ease: Power4.easeOut, onComplete: done });
            },
            leave(el, done) { TweenMax.to(el, 0.8, { scale: 0, autoAlpha: 0, onComplete: done }); }
        }
    });
});

new Vue({
    el: '#vue-app',
    data: animState,
    methods: { setView(a) { animState.view = a; } }
});
</script>

<script type="text/babel">
const { useState } = React;
const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

const Dashboard = () => {
    const data = [
        { name: '2022', val: 4000 }, { name: '2023', val: 3000 },
        { name: '2024', val: 5000 }, { name: '2025', val: 8000 }
    ];

    return (
        <div className="bg-[#0f172a] p-8 rounded-[32px] border border-white/5 shadow-2xl">
            <h3 className="syne text-2xl font-black mb-6">Analyse Macro-Économique</h3>
            <div style={{ width: '100%', height: 300 }}>
                <ResponsiveContainer>
                    <AreaChart data={data}>
                        <defs>
                            <linearGradient id="colorVal" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="5%" stopColor="#10b981" stopOpacity={0.3}/>
                                <stop offset="95%" stopColor="#10b981" stopOpacity={0}/>
                            </linearGradient>
                        </defs>
                        <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" vertical={false} />
                        <XAxis dataKey="name" stroke="#475569" fontSize={12} />
                        <YAxis stroke="#475569" fontSize={12} />
                        <Tooltip />
                        <Area type="monotone" dataKey="val" stroke="#10b981" fillOpacity={1} fill="url(#colorVal)" />
                    </AreaChart>
                </ResponsiveContainer>
            </div>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('dynamic-content-root'));
root.render(<Dashboard />);
</script>

</body>
</html>
